{% extends 'base.html' %}

{% block title %}Некорректный запрос - 400{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-template">
                <h1 class="display-1 text-muted">400</h1>
                <h2 class="mb-4">Некорректный запрос</h2>
                <div class="error-details mb-4">
                    <p class="lead">Сервер не может обработать ваш запрос.</p>
                    <p>Возможно, запрос содержит неверные данные или синтаксические ошибки.</p>
                </div>
                <div class="error-actions">
                    <a href="javascript:history.back()" class="btn btn-secondary btn-lg me-2">
                        <i class="fas fa-arrow-left"></i> Вернуться назад
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
