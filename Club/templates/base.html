<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CyberX - Киберспортивный клуб{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            background: #050505;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(220,38,38,0.08), transparent 12%),
                radial-gradient(circle at 80% 10%, rgba(255,255,255,0.04), transparent 10%),
                linear-gradient(180deg, #050505 0%, #0b0b0b 50%, #111111 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.55;
        }

        body::before {
            width: 420px;
            height: 420px;
            left: -140px;
            top: 10%;
            background: radial-gradient(circle, rgba(220,38,38,0.06), transparent 68%);
            animation: pageFloat 14s ease-in-out infinite;
        }

        body::after {
            width: 300px;
            height: 300px;
            right: -80px;
            bottom: 8%;
            background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 68%);
            animation: pageFloat 18s ease-in-out infinite reverse;
        }

        @keyframes pageFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.04); }
        }
        
        main {
            flex: 1;
            position: relative;
            z-index: 1;
            /* Отступ будет добавлен динамически через JS */
        }
        
        /* Остальные стили... */

        
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Навигация -->
    {% include 'components/_navbar.html' %}
    
    <!-- Сообщения -->
    {% include 'components/_messages.html' %}
    
    <!-- Основной контент -->
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    <!-- Футер -->
    {% include 'components/_footer.html' %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Динамический отступ для фиксированной навигации
        function adjustMainMargin() {
            const navbar = document.getElementById('mainNavbar');
            const main = document.querySelector('main');
            if (navbar && main) {
                const navbarHeight = navbar.offsetHeight;
                main.style.marginTop = navbarHeight + 'px';
            }
        }
        
        document.addEventListener('DOMContentLoaded', adjustMainMargin);
        window.addEventListener('resize', adjustMainMargin);
        
        // Наблюдатель за изменениями навигации
        const observer = new MutationObserver(adjustMainMargin);
        observer.observe(document.getElementById('mainNavbar'), { 
            attributes: true, 
            attributeFilter: ['style', 'class'] 
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
